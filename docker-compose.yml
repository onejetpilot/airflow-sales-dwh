services:
  postgress:
    image: postgres:15
    container_name: sales_dwh_postgres
    environment:
      POSTGRES_USER: sales_user
      POSTGRES_PASSWORD: sales_password
      POSTGRES_DB: sales_db
    ports: 
      - "5434:5432"
    volumes:
     - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: