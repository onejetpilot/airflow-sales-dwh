services:
  postgress:
    image: postgres:15
    container_name: sales_dwh_postgres
    environment:
      POSTGRES_USER: sales_user
      POSTGRES_PASSWORD: sales_password
      POSTGRES_DB: sales_db
    ports: 
      - "5434:5432"
    volumes:
     - postgres_data:/var/lib/postgresql/data

  airflow:
    image: apache/airflow:3.2.1
    container_name: sales_dwh_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: sales_dwh_secret_key
      AIRFLOW_CONN_SALES_DWH: postgresql+psycopg2://sales_user:sales_password@postgress:5432/sales_db
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./sql:/opt/airflow/sql
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: >
      bash -c "
        set -e
        airflow db migrate
        airflow dag-processor &
        airflow api-server &
        exec airflow scheduler
      "

volumes:
  postgres_data:

